# main push 시 Render 배포 훅 호출 (선택)
# GitHub 저장소 → Settings → Secrets → RENDER_DEPLOY_HOOK 에 Render Deploy Hook URL 등록
name: Deploy

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --check server.mjs

  deploy-render:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
