# main push → Cloudflare Pages 배포
# GitHub Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (없으면 워크플로만 건너뜀)
name: Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Cloudflare Secrets 확인
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Secrets에 CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID가 없어 Actions 배포를 건너뜁니다."
            echo "::warning::Cloudflare 대시보드에서 Git 연결 배포를 쓰거나, Secrets 등록 후 workflow_dispatch로 다시 실행하세요."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.ready == 'true'
        with:
          node-version: "22"

      - name: 의존성 설치
        if: steps.cf.outputs.ready == 'true'
        run: npm install

      - name: Pages 프로젝트 생성 (없을 때만)
        if: steps.cf.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create hyunji --production-branch=main || true

      - name: Cloudflare Pages 배포
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=hyunji --branch=main --commit-dirty=true
